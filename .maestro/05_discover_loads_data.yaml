appId: com.playsmashd.app
name: "Discover Screen - Data Loads"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Navigate to Discover
- tapOn:
    text: "Discover, tab, 2 of 6"
- assertVisible:
    id: "screen-discover"

# Wait for data to load — text shows "[N] events found"
- extendedWaitUntil:
    visible:
      text: ".*events found"
    timeout: 15000

# Capture marketing screenshot of Discover screen with events
- takeScreenshot: screenshots/discover_events

appId: com.playsmashd.app
name: "Join Tournament - Screen Loads and Code Input Works"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Navigate to Play tab and wait for content to load
- tapOn:
    text: "Play, tab, 3 of 6"
- extendedWaitUntil:
    visible:
      id: "btn-create-tournament"
    timeout: 10000

# Scroll down to find Join quick action (below format cards and Create button)
- scrollUntilVisible:
    element:
      text: "Join"
    direction: DOWN
    timeout: 5000
- tapOn: "Join"
- extendedWaitUntil:
    visible:
      id: "screen-join"
    timeout: 5000

# Verify UI elements
- assertVisible: "Enter Join Code"
- assertVisible: "Ask the tournament organiser for the 4-character code"
- assertVisible: "JOIN"

# Test input - type an invalid code
- tapOn: "e.g. 7X2K"
- inputText: "ZZZZ"

# Tap JOIN — should show "Not found" alert for invalid code
- tapOn: "JOIN"
- extendedWaitUntil:
    visible: "Not found"
    timeout: 10000
- tapOn: "OK"

# Take screenshot
- takeScreenshot: screenshots/join_screen

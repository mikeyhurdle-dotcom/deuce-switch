appId: com.playsmashd.app
name: "Connected Tools - Toggle Tools in Settings"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Navigate to Stats → Settings
- tapOn:
    id: "tab-stats"
- waitForAnimationToEnd
- tapOn:
    id: "btn-stats-settings"
- extendedWaitUntil:
    visible:
      id: "screen-settings"
    timeout: 5000

# Scroll to Connected Tools section
- scrollUntilVisible:
    element:
      id: "section-connected-tools"
    direction: DOWN
    timeout: 5000

# Verify tools are listed
- assertVisible: "Padelio"
- assertVisible: "PadelPlay"

# Take screenshot
- takeScreenshot: screenshots/connected_tools

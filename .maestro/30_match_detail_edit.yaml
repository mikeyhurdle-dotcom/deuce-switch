appId: com.playsmashd.app
name: "Match Detail - View and Edit Score (Sprint 2)"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Navigate to Stats tab (match history is now here)
- tapOn:
    id: "tab-stats"
- extendedWaitUntil:
    visible:
      id: "screen-stats"
    timeout: 5000
- waitForAnimationToEnd

# Tap first tournament in history (if exists)
- tapOn:
    index: 0
    id: ".*tournament-card.*"
    optional: true

# If we navigated to a tournament, look for matches
- runFlow:
    when:
      visible:
        text: "Round 1"
    file: flows/noop.yaml

# Take screenshot of whatever state we're in
- takeScreenshot: screenshots/match_detail_or_history

appId: com.playsmashd.app
name: "Settings Screen - All Sections Visible"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Navigate to Stats → Settings via gear icon
- tapOn:
    id: "tab-stats"
- waitForAnimationToEnd
- tapOn:
    id: "btn-stats-settings"
- extendedWaitUntil:
    visible:
      id: "screen-settings"
    timeout: 10000
- waitForAnimationToEnd

# Verify avatar editor
- assertVisible:
    id: "btn-edit-avatar"

# Verify Profile section at top
- assertVisible: "Profile"

# Scroll through sections one by one
- scrollUntilVisible:
    element:
      text: "Appearance"
    direction: DOWN
    timeout: 15000

- scrollUntilVisible:
    element:
      text: "Home Club"
    direction: DOWN
    timeout: 15000

- scrollUntilVisible:
    element:
      text: "Privacy Policy"
    direction: DOWN
    timeout: 15000

- scrollUntilVisible:
    element:
      text: "Log Out"
    direction: DOWN
    timeout: 15000

# Take screenshot at bottom
- takeScreenshot: screenshots/settings_screen

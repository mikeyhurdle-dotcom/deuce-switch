appId: com.playsmashd.app
name: "Import Matches - Screen Loads with Upload Zone"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Navigate to Profile tab
- tapOn:
    text: "Profile, tab, 5 of 6"
- extendedWaitUntil:
    visible:
      id: "screen-profile"
    timeout: 10000

# Switch to History sub-tab (has its own Import Match from Screenshot button)
- tapOn:
    id: "tab-profile-history"
- waitForAnimationToEnd

# Tap Import Match from Screenshot button inside the History tab
- scrollUntilVisible:
    element:
      text: "Import Match from Screenshot"
    direction: DOWN
    timeout: 10000
- tapOn: "Import Match from Screenshot"
- extendedWaitUntil:
    visible:
      id: "screen-import-matches"
    timeout: 5000

# Verify upload zone is present
- assertVisible: "Screenshot Import"
- assertVisible: "Take a photo or select a screenshot from your match history"

# Verify camera and library buttons
- assertVisible: "Camera"
- assertVisible: "Photo Library"

# Verify platform chips are visible
- assertVisible: "Nettla"
- assertVisible: "Playtomic"
- assertVisible: "Padel Mates"
- assertVisible: "Matchii"

# Take screenshot
- takeScreenshot: screenshots/import_matches_screen

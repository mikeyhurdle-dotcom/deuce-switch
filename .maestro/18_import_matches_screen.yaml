appId: com.playsmashd.app
name: "Import Matches - Screen Loads with Upload Zone"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Open Log Match bottom sheet
- tapOn:
    id: "tab-log-match"
- waitForAnimationToEnd

# Tap Import Screenshot option (only visible if user has tracking tools)
# If not visible, the test is skipped — import needs tool configuration first
- tapOn:
    id: "btn-import-screenshot"
    optional: true

# If import screen loaded, verify upload zone
- runFlow:
    when:
      visible:
        id: "screen-import-matches"
    file: flows/noop.yaml

# Take screenshot
- takeScreenshot: screenshots/import_matches_screen

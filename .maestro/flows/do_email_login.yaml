appId: com.playsmashd.app
name: "Shared - Perform Email Login"
---
- tapOn:
    id: "input-email"
- inputText: "maestro-test@playsmashd.com"
- tapOn:
    id: "input-password"
- inputText: "SmashdTest2026!"
- tapOn:
    id: "btn-sign-in"

# Dismiss iOS "Save Password?" dialog if it appears
- tapOn:
    text: "Not Now"
    optional: true

# Handle profile setup wizard if it appears (Sprint 3 onboarding)
- runFlow:
    when:
      visible:
        id: "screen-profile-setup"
    file: dismiss_profile_setup.yaml

# Wait for home screen
- extendedWaitUntil:
    visible:
      id: "screen-home"
    timeout: 15000

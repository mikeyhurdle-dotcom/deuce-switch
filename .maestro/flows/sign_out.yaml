appId: com.playsmashd.app
name: "Shared - Sign Out"
---
# Navigate to Stats tab
- tapOn:
    id: "tab-stats"
- waitForAnimationToEnd

# Tap gear icon to go to Settings
- tapOn:
    id: "btn-stats-settings"
- extendedWaitUntil:
    visible:
      id: "screen-settings"
    timeout: 10000
- waitForAnimationToEnd

# Scroll down to the Sign Out button (Settings is long — profile, tools, linked, appearance, club, account, about, logout)
- scrollUntilVisible:
    element:
      text: "Log Out"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "Log Out"

# Wait for the confirmation alert to appear
- extendedWaitUntil:
    visible: "Are you sure you want to sign out?"
    timeout: 5000

# Confirm sign out in the alert
- tapOn:
    text: "Sign Out"
    index: 1

# Wait for sign-in screen to appear
- extendedWaitUntil:
    visible:
      id: "btn-sign-in"
    timeout: 10000

appId: com.playsmashd.app
name: "Shared - Sign Out"
---
- tapOn:
    text: "Profile, tab, 5 of 6"
- waitForAnimationToEnd

# Scroll down to the Sign Out button on the Profile screen
- scrollUntilVisible:
    element:
      id: "btn-sign-out"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "btn-sign-out"

# Wait for the confirmation alert to appear
- extendedWaitUntil:
    visible: "Are you sure you want to sign out?"
    timeout: 5000

# Confirm sign out in the alert (index 1 = alert button, not the profile button)
- tapOn:
    text: "Sign Out"
    index: 1

# Wait for sign-in screen to appear (consent is a one-time per-device gate)
- extendedWaitUntil:
    visible:
      id: "btn-sign-in"
    timeout: 10000

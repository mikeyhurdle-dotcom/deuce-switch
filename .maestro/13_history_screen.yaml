appId: com.playsmashd.app
name: "History / Recent Matches - Visible on Stats Tab"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Navigate to Stats tab (recent matches are now shown here)
- tapOn:
    id: "tab-stats"
- waitForAnimationToEnd
- assertVisible:
    id: "screen-stats"

# Take screenshot — Stats tab shows recent matches section
- takeScreenshot: screenshots/stats_recent_matches

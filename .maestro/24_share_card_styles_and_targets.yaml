appId: com.playsmashd.app
name: "Share Screen — Card Styles + Copy Link + Feed CTA"
---
# Creates a tournament, plays through to results, then exercises
# the share screen: switching card styles and tapping share targets.
- launchApp
- runFlow: flows/sign_in_email.yaml

# ── Create tournament + score + end ─────────────────────────────────────
- tapOn:
    text: "Play, tab, 3 of 6"
- tapOn:
    id: "btn-create-tournament"
- tapOn:
    id: "input-tournament-name"
- inputText: "Share Test"
- pressKey: Enter
- tapOn:
    id: "btn-wizard-next"
- extendedWaitUntil:
    visible: "SETTINGS"
    timeout: 5000
- tapOn:
    id: "btn-wizard-next"
- extendedWaitUntil:
    visible: "Create Tournament"
    timeout: 5000
- tapOn:
    id: "btn-wizard-create"
- extendedWaitUntil:
    visible: "JOIN CODE"
    timeout: 10000

# Scroll to Add Player button
- scrollUntilVisible:
    element:
      id: "btn-add-player"
    direction: DOWN
    timeout: 5000

# Add 3 players
- tapOn:
    id: "btn-add-player"
- tapOn:
    id: "input-first-name"
- inputText: "Alice"
- tapOn:
    id: "input-last-name"
- inputText: "Smith"
- tapOn:
    id: "btn-confirm-add-player"
- waitForAnimationToEnd

- tapOn:
    id: "btn-add-player"
- tapOn:
    id: "input-first-name"
- inputText: "Bob"
- tapOn:
    id: "input-last-name"
- inputText: "Jones"
- tapOn:
    id: "btn-confirm-add-player"
- waitForAnimationToEnd

- tapOn:
    id: "btn-add-player"
- tapOn:
    id: "input-first-name"
- inputText: "Carol"
- tapOn:
    id: "input-last-name"
- inputText: "Davis"
- tapOn:
    id: "btn-confirm-add-player"
- waitForAnimationToEnd

# Start → Score → End
- tapOn:
    id: "btn-start-tournament"
- extendedWaitUntil:
    visible:
      id: "screen-tournament-play"
    timeout: 10000

- tapOn:
    id: "btn-submit-score"
    index: 0
- tapOn:
    id: "input-score-a"
- inputText: "15"
- tapOn:
    id: "input-score-b"
- inputText: "6"
- tapOn:
    id: "btn-set-score"
- waitForAnimationToEnd

- tapOn:
    id: "btn-end-tournament"
- tapOn: "End"

# ── Navigate to Results → Share ─────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "screen-tournament-results"
    timeout: 15000

- tapOn:
    id: "btn-share-results"
- extendedWaitUntil:
    visible:
      id: "screen-tournament-share"
    timeout: 10000

# ── Verify share screen loaded ──────────────────────────────────────────
- assertVisible: "Share Result"
- assertVisible: "CARD STYLE"
- assertVisible: "SHARE TO"
- takeScreenshot: screenshots/share_01_default_dark

# ── Switch card styles ──────────────────────────────────────────────────
- tapOn:
    id: "btn-card-style-neon"
- takeScreenshot: screenshots/share_02_neon

- tapOn:
    id: "btn-card-style-violet"
- takeScreenshot: screenshots/share_03_violet

- tapOn:
    id: "btn-card-style-light"
- takeScreenshot: screenshots/share_04_light

- tapOn:
    id: "btn-card-style-dark"

# ── Test Copy Link (safe — shows alert, no external app needed) ─────────
- tapOn:
    id: "btn-share-copy"
- extendedWaitUntil:
    visible: "Copied!"
    timeout: 5000
- tapOn: "OK"

# ── Verify all share targets are visible ────────────────────────────────
- assertVisible: "Stories"
- assertVisible: "WhatsApp"
- assertVisible: "Twitter"
- assertVisible: "Copy Link"
- assertVisible: "Instagram"
- assertVisible: "Save Image"
- assertVisible: "More"
- assertVisible: "My Feed"

# ── Test Feed CTA button ────────────────────────────────────────────────
- assertVisible:
    id: "btn-feed-cta"
- assertVisible: "Add to My Feed"

- takeScreenshot: screenshots/share_05_all_targets_visible


appId: com.playsmashd.app
name: "Sign Out Flow"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Navigate to Stats tab
- tapOn:
    id: "tab-stats"
- waitForAnimationToEnd

# Tap gear icon → Settings
- tapOn:
    id: "btn-stats-settings"
- extendedWaitUntil:
    visible:
      id: "screen-settings"
    timeout: 10000
- waitForAnimationToEnd

# Scroll to logout button
- scrollUntilVisible:
    element:
      text: "Log Out"
    direction: DOWN
    timeout: 15000
- tapOn:
    text: "Log Out"

# Wait for the confirmation alert
- extendedWaitUntil:
    visible: "Are you sure you want to sign out?"
    timeout: 5000

# Confirm sign out
- tapOn:
    text: "Sign Out"
    index: 1

# Should return to sign-in screen
- extendedWaitUntil:
    visible:
      id: "btn-sign-in"
    timeout: 10000

appId: com.playsmashd.app
name: "Tab Navigation - All Tabs Accessible"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Home screen visible
- assertVisible:
    id: "screen-home"
- takeScreenshot: screenshots/home_screen

# Navigate to Discover
- tapOn:
    id: "tab-discover"
- assertVisible:
    id: "screen-discover"
- takeScreenshot: screenshots/discover_screen

# Navigate to Coach
- tapOn:
    id: "tab-coach"
- assertVisible:
    id: "screen-coach"
- takeScreenshot: screenshots/coach_screen

# Tap Log Match centre button (opens bottom sheet, not a screen)
- tapOn:
    id: "tab-log-match"
- waitForAnimationToEnd
# Dismiss by tapping outside / swiping down
- swipe:
    direction: DOWN
    duration: 300

# Navigate to Stats
- tapOn:
    id: "tab-stats"
- waitForAnimationToEnd
- assertVisible:
    id: "screen-stats"
- takeScreenshot: screenshots/stats_screen

# Back to Home
- tapOn:
    id: "tab-home"
- assertVisible:
    id: "screen-home"

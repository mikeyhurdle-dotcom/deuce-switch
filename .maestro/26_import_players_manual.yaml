appId: com.playsmashd.app
name: "Import Players — Manual Add Flow"
---
# Tests the import players screen's manual add functionality.
# Since the OCR flow requires a real tournament context and image picker,
# this test focuses on the manual player add path which is always available.
#
# NOTE: The import-players screen requires a tournamentId param to navigate
# back to the lobby. We test it by creating a tournament first.
- launchApp
- runFlow: flows/sign_in_email.yaml

# ── Create tournament ───────────────────────────────────────────────────
- tapOn:
    id: "tab-home"
- tapOn:
    id: "btn-host-tournament"
- tapOn:
    id: "input-tournament-name"
- inputText: "Import Players Test"
- pressKey: Enter
- tapOn:
    id: "btn-wizard-next"
- extendedWaitUntil:
    visible: "SETTINGS"
    timeout: 5000
- tapOn:
    id: "btn-wizard-next"
- extendedWaitUntil:
    visible: "Create Tournament"
    timeout: 5000
- tapOn:
    id: "btn-wizard-create"
- extendedWaitUntil:
    visible:
      id: "screen-tournament-lobby"
    timeout: 20000
- extendedWaitUntil:
    visible: "Waiting for"
    timeout: 10000
- waitForAnimationToEnd

# ── Navigate to Import Players ──────────────────────────────────────────
# The import players button is available from the lobby screen
- scrollUntilVisible:
    element:
      text: "Import Players from Screenshot"
    direction: DOWN
    timeout: 15000
- tapOn: "Import Players from Screenshot"

- extendedWaitUntil:
    visible:
      id: "screen-import-players"
    timeout: 5000

# ── Verify upload zone ──────────────────────────────────────────────────
- assertVisible: "Screenshot Import"
# Camera button may not be visible on simulator (permission dialog blocks it)
- assertVisible:
    text: "Camera"
    optional: true
- assertVisible: "Photo Library"
- assertVisible: "Supported platforms:"
- takeScreenshot: screenshots/import_players_01_upload_zone


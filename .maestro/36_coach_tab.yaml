appId: com.playsmashd.app
name: "Coach Tab - Videos Load"
---
- launchApp
- runFlow: flows/sign_in_email.yaml

# Navigate to Coach tab
- tapOn:
    id: "tab-coach"
- waitForAnimationToEnd
- assertVisible:
    id: "screen-coach"

# Verify header
- assertVisible: "Coach"

# Take screenshot
- takeScreenshot: screenshots/coach_tab
